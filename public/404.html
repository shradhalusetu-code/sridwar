<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sri Dwar – Page Not Found</title>
    <meta name="robots" content="noindex" />
    <!-- Redirect back to the homepage after 0 seconds.
         This is required for GitHub Pages to handle SPA routing correctly.
         Without this file, any direct link to a section gives a blank page. -->
    <script>
      // Save the current path so the app can handle it if needed
      sessionStorage.setItem('redirectPath', window.location.pathname);
      // Redirect to homepage immediately
      window.location.replace('/');
    </script>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        background: #021816;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 2rem;
      }
      h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
      p  { color: rgba(255,255,255,0.6); font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <div>
      <h1>🙏 Redirecting to Sri Dwar...</h1>
      <p>If you are not redirected automatically, <a href="/" style="color:#FFB347;">click here</a>.</p>
    </div>
  </body>
</html>
