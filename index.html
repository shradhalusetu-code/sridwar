    <!-- ═══════════════════════════════════════════════════════════════
         PERFORMANCE FIX — Preconnects (kept + extended)
         Preconnect must exist for EVERY origin the browser will fetch
         from during first paint. Fonts were missing before, which
         forced a slow serial connection right when the page needed it.
    ═══════════════════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin />
    <link rel="preconnect" href="https://www.google-analytics.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.clarity.ms" crossorigin />

    <!-- ═══════════════════════════════════════════════════════════════
         PERFORMANCE FIX — Fonts moved OUT of index.css @import
         @import inside CSS blocks the page render until the imported
         file is fetched AND parsed — it cannot start until the CSS
         file itself has already loaded, so the fonts request only
         starts after a full round trip. Loading them here instead,
         in parallel with the CSS, removes that serial waterfall.
         `media="print" onload="this.media='all'"` loads the
         stylesheet without blocking rendering; the <noscript> is the
         fallback for the rare no-JS visitor.
    ═══════════════════════════════════════════════════════════════ -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      />
    </noscript>

    <!-- ═══════════════════════════════════════════════════════════════
         Google Tag Manager
         NOTE: gtag.js below loads the SAME Google Analytics library
         that GTM can already fire through a GA4 Configuration tag.
         Loading both means devotees download two overlapping analytics
         libraries on every page view. If your GTM container already
         has a GA4 tag configured, DELETE the "Google tag (gtag.js)"
         block below entirely — GTM will still send GA4 hits. Only keep
         both if you specifically rely on gtag() calls from your own
         code (search this project for `gtag(`).
    ═══════════════════════════════════════════════════════════════ -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-5CSKPDHS');</script>

    <!-- Google tag (gtag.js) — see note above before deleting -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LXYRS86RGH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-LXYRS86RGH');
    </script>

        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "xmu1fmyg2x");
    </script>

    <!-- ═══════════════════════════════════════════════════════════════
         SEO FIX — static <h1> for crawlers
         This app renders client-side only (see <div id="root"> below), so
         the real on-screen heading in Hero.tsx doesn't exist yet in the
         raw HTML a crawler fetches — that's why automated audits (Bing
         Webmaster Tools SEO check, 2026-07-15) flagged "the <h1> tag is
         missing" on this page. This tag lives OUTSIDE #root, so React
         never touches or removes it; it stays in the page for any crawler
         that doesn't execute JS, while being visually hidden (not deleted
         — screen readers still announce it) for everyone else, so nothing
         about the visual design changes. Keep this in sync with Hero.tsx's
         real <h1> if that headline ever changes.
    ═══════════════════════════════════════════════════════════════ -->
    <h1 style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">
      Sri Dwar – Book Online Puja, Seva & Live Temple Darshan from India's Sacred Temples
    </h1>
